# platform.conf - configuracion global de la plataforma.
# Copia este archivo y ajusta. NO subas secretos reales a GitHub.

# ===== SIEM =====
SIEM_ENABLED=false
SIEM_TYPE=none                 # splunk | elk_http | syslog | none
SPLUNK_HOST=""
SPLUNK_HEC_TOKEN=""
ELK_HTTP_URL=""                # ej: http://elk:9200/hardening/_doc

# ===== Alertas =====
ALERTS_ENABLED=false
ALERT_MIN_SEVERITY=high        # critical | high | medium | low
ALERT_CHANNELS="telegram"      # espacio-separado: "telegram email"
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""
ALERT_EMAIL_TO=""

# ===== IA (Fase 2, opcional) =====
AI_SUMMARY_ENABLED=false          # true: genera informe IA al final de cada escaneo batch
AI_PROVIDER=none                  # anthropic | openai | none  (none = resumen heuristico)
AI_MODEL=claude-sonnet-4-6        # modelo LLM a usar
AI_API_KEY=""                     # MEJOR: dejala vacia aqui y ponela en config/secrets.env (gitignored)
AI_API_URL=""                     # opcional: endpoint personalizado (OpenAI-compatible)
